<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard - RecruitTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #020617;
      --card-bg: rgba(30, 41, 59, 0.5);
      --primary-cyan: #06b6d4;
      --primary-teal: #14b8a6;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.1);
      --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #14b8a6 100%);
      --error-color: #ef4444;
      --success-color: #10b981;
      --warning-color: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-color);
      background-image:
        radial-gradient(circle at 10% 10%, rgba(6, 182, 212, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(20, 184, 166, 0.03) 0%, transparent 50%);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 0.6rem 1.25rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary-cyan);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .section {
      margin-bottom: 4rem;
    }

    .section h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      color: var(--text-secondary);
    }

    select,
    input,
    textarea {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.875rem;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    select:focus,
    input:focus,
    textarea:focus {
      border-color: var(--primary-cyan);
      box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
    }

    .btn {
      background: var(--accent-gradient);
      color: #020617;
      border: none;
      padding: 0.875rem 1.75rem;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3);
    }

    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .job-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 1.25rem;
      padding: 2rem;
      transition: all 0.3s ease;
    }

    .job-card:hover {
      transform: translateY(-6px);
      border-color: var(--primary-cyan);
    }

    .job-card h3 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--primary-cyan);
    }

    .job-card p {
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .job-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1.25rem 0;
    }

    .job-tag {
      background: rgba(6, 182, 212, 0.1);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--primary-cyan);
      font-weight: 600;
    }

    .table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .table th,
    .table td {
      padding: 1.25rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .table th {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table td {
      font-size: 0.95rem;
    }

    .status-badge {
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-applied {
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
    }

    .status-interview {
      background: rgba(251, 191, 36, 0.1);
      color: #fbbf24;
    }

    .status-offer {
      background: rgba(52, 211, 153, 0.1);
      color: #34d399;
    }

    .status-rejected {
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
    }

    .loading {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid var(--primary-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 1.25rem 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(-10px);
      pointer-events: auto;
    }

    .toast.error {
      border-color: var(--error-color);
    }

    .toast.success {
      border-color: var(--success-color);
    }

    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }

      .jobs-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <h1>Student Dashboard</h1>
    <button class="back-btn" onclick="window.location = 'index.html'">
      Back to Home
    </button>
  </header>

  <div class="container">
    <section class="section">
      <div class="card">
        <label for="studentSelector"><strong>You are browsing as Student ID:</strong></label>
        <select id="studentSelector"></select>
      </div>
    </section>
    <section class="section">
      <h2>Available Jobs</h2>
      <div id="jobsContainer" class="jobs-grid">
        <div class="loading"></div>
      </div>
    </section>

    <section class="section">
      <h2>My Applications</h2>
      <div class="card">
        <table class="table" id="applicationsTable">
          <thead>
            <tr>
              <th>Application ID</th>
              <th>Job Role</th>
              <th>Company</th>
              <th>Date Applied</th>
              <th>Current Stage</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="section">
      <h2>Application Status Statistics</h2>
      <div class="card" style="max-width: 500px; margin: 0 auto; min-height: 400px;">
        <canvas id="statusChart"></canvas>
      </div>
    </section>

    <div id="toast" class="toast"></div>

    <script>
      const API_BASE = "http://localhost:5000";
      let currentStudentId = null;
      let statusChart = null;

      // Toast notification
      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      // Load departments
      async function loadDepartments() {
        try {
          const response = await fetch(`${API_BASE}/api/departments`);
          const departments = await response.json();
          const select = document.getElementById("department");
          departments.forEach((dept) => {
            const option = document.createElement("option");
            option.value = dept.department_id;
            option.textContent = dept.department_name;
            select.appendChild(option);
          });
        } catch (error) {
          console.error("Error loading departments:", error);
        }
      }

      async function loadStudents() {
        try {
          const response = await fetch(`${API_BASE}/api/students`);
          const students = await response.json();
          const select = document.getElementById("studentSelector");
          select.innerHTML = "";

          if (!students || students.length === 0) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "No students available";
            select.appendChild(option);
            currentStudentId = null;
            return;
          }

          students.forEach((student) => {
            const option = document.createElement("option");
            option.value = student.student_id;
            option.textContent = `${student.student_id} - ${student.name}`;
            select.appendChild(option);
          });

          currentStudentId = students[0].student_id;
          select.value = currentStudentId;
          loadApplications();

          select.addEventListener("change", () => {
            currentStudentId = parseInt(select.value, 10);
            loadApplications();
          });
        } catch (error) {
          console.error("Error loading students:", error);
        }
      }

      // Load jobs
      async function loadJobs() {
        try {
          const response = await fetch(`${API_BASE}/api/jobs`);
          const jobs = await response.json();
          const container = document.getElementById("jobsContainer");
          container.innerHTML = "";

          if (jobs.length === 0) {
            container.innerHTML = "<p>No jobs available at the moment.</p>";
            return;
          }

          jobs.forEach((job) => {
            const jobCard = document.createElement("div");
            jobCard.className = "job-card";
            jobCard.innerHTML = `
                        <h3>${job.role}</h3>
                        <p><strong>Company:</strong> ${job.company_name}</p>
                        <p><strong>Package:</strong> ₹${job.package_offered} LPA</p>
                        <p><strong>Work Mode:</strong> ${job.work_mode}</p>
                        <p><strong>Experience:</strong> ${job.experience_required} years</p>
                        <p><strong>Openings:</strong> ${job.no_of_openings}</p>
                        <p><strong>Min CGPA:</strong> ${job.min_cgpa ?? "-"}</p>
                        <div class="job-tags">
                            ${job.required_skills
                .split(",")
                .map(
                  (skill) =>
                    `<span class="job-tag">${skill.trim()}</span>`,
                )
                .join("")}
                        </div>
                        <button class="btn" onclick="applyForJob(${job.job_id})">Apply</button>
                    `;
            container.appendChild(jobCard);
          });
        } catch (error) {
          console.error("Error loading jobs:", error);
          document.getElementById("jobsContainer").innerHTML =
            "<p>Error loading jobs. Please try again later.</p>";
        }
      }

      // Apply for job
      async function applyForJob(jobId) {
        if (!currentStudentId) {
          showToast("Please select a Student ID before applying.", "error");
          return;
        }

        try {
          const response = await fetch(`${API_BASE}/api/apply`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              student_id: currentStudentId,
              job_id: jobId,
            }),
          });
          if (response.ok) {
            showToast("Application submitted successfully!");
            loadApplications();
          } else {
            const data = await response.json();
            showToast(data.error || "Error submitting application.", "error");
          }
        } catch (error) {
          console.error("Error applying for job:", error);
          showToast("Error submitting application.", "error");
        }
      }

      // Load applications
      async function loadApplications() {
        if (!currentStudentId) {
          const tbody = document.querySelector("#applicationsTable tbody");
          tbody.innerHTML =
            "<tr><td colspan=5>Please select a Student ID to view applications.</td></tr>";
          return;
        }

        try {
          const response = await fetch(
            `${API_BASE}/api/applications?student_id=${currentStudentId}`,
          );
          const applications = await response.json();
          const tbody = document.querySelector("#applicationsTable tbody");
          tbody.innerHTML = "";

          if (!applications || applications.length === 0) {
            tbody.innerHTML =
              "<tr><td colspan=5>No applications found.</td></tr>";
            updateChart([]);
            return;
          }

          applications.forEach((app) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                        <td>${app.application_id}</td>
                        <td>${app.job_role}</td>
                        <td>${app.company_name}</td>
                        <td>${app.application_date ? new Date(app.application_date).toLocaleDateString() : "-"}</td>
                        <td><span class="status-badge status-${app.current_stage.toLowerCase()}">${app.current_stage}</span></td>
                    `;
            tbody.appendChild(row);
          });

          updateChart(applications);
        } catch (error) {
          console.error("Error loading applications:", error);
        }
      }

      function updateChart(applications) {
        const statusCounts = applications.reduce((acc, app) => {
          const status = app.current_stage;
          acc[status] = (acc[status] || 0) + 1;
          return acc;
        }, {});

        const labels = Object.keys(statusCounts);
        const data = Object.values(statusCounts);

        if (statusChart) {
          statusChart.destroy();
        }

        const ctx = document.getElementById('statusChart').getContext('2d');

        // Define theme-consistent colors
        const colors = {
          'Applied': '#06b6d4',
          'Interview': '#f59e0b',
          'Offer': '#10b981',
          'Rejected': '#ef4444'
        };

        const backgroundColors = labels.map(label => colors[label] || '#64748b');

        statusChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: labels,
            datasets: [{
              label: 'Application Status',
              data: data,
              backgroundColor: backgroundColors,
              borderColor: 'rgba(2, 6, 23, 0.8)',
              borderWidth: 2,
              hoverOffset: 15,
              borderRadius: 5
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '75%',
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  color: '#94a3b8',
                  padding: 20,
                  font: {
                    size: 13,
                    family: 'DM Sans'
                  },
                  usePointStyle: true,
                  pointStyle: 'circle'
                }
              },
              title: {
                display: false
              },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                titleColor: '#06b6d4',
                bodyColor: '#f8fafc',
                borderColor: 'rgba(255, 255, 255, 0.1)',
                borderWidth: 1,
                padding: 12,
                displayColors: false
              }
            },
            animation: {
              animateScale: true,
              animateRotate: true
            }
          }
        });
      }

      // Form submit handler removed as form was moved to add-student.html

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        loadStudents();
        loadDepartments();
        loadJobs();
      });
    </script>
</body>

</html>
