<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Profile - RecruitTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --primary-cyan: #06b6d4;
            --primary-teal: #14b8a6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #14b8a6 100%);
            --error-color: #ef4444;
            --success-color: #10b981;
            --warning-color: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(6, 182, 212, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(20, 184, 166, 0.03) 0%, transparent 50%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-cyan);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 0.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.875rem;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: var(--accent-gradient);
            color: #020617;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3);
        }

        .form-grid-full {
            grid-column: span 2;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1.25rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(-10px);
            pointer-events: auto;
        }

        .toast.error {
            border-color: var(--error-color);
        }

        .toast.success {
            border-color: var(--success-color);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-grid-full {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>Add Student Profile</h1>
        <button class="back-btn" onclick="window.location = 'index.html'">
            Back to Home
        </button>
    </header>

    <div class="container">
        <section class="section">
            <h2>Student Details</h2>
            <div class="card">
                <form id="studentForm" class="form-grid">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" name="phone" required />
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" name="dob" required />
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required />
                    </div>
                    <div class="form-group">
                        <label for="tenth_percent">10th Percentage</label>
                        <input type="number" step="0.01" id="tenth_percent" name="tenth_percent" required />
                    </div>
                    <div class="form-group">
                        <label for="twelfth_percent">12th Percentage</label>
                        <input type="number" step="0.01" id="twelfth_percent" name="twelfth_percent" required />
                    </div>
                    <div class="form-group">
                        <label for="cgpa">CGPA</label>
                        <input type="number" step="0.01" id="cgpa" name="cgpa" required />
                    </div>
                    <div class="form-group">
                        <label for="yos">Years of Study</label>
                        <input type="number" id="yos" name="yos" required />
                    </div>
                    <div class="form-group">
                        <label for="backlog">Backlog Count</label>
                        <input type="number" id="backlog" name="backlog" required />
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <div class="form-group form-grid-full">
                        <label for="skill_set">Skill Set</label>
                        <textarea id="skill_set" name="skill_set" required></textarea>
                    </div>
                    <div class="form-group form-grid-full">
                        <button type="submit" class="btn">Add Profile</button>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = "http://localhost:5000";

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        async function loadDepartments() {
            try {
                const response = await fetch(`${API_BASE}/api/departments`);
                const departments = await response.json();
                const select = document.getElementById("department");
                departments.forEach((dept) => {
                    const option = document.createElement("option");
                    option.value = dept.department_id;
                    option.textContent = dept.department_name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading departments:", error);
            }
        }

        document.getElementById("studentForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            if (!data.department || isNaN(parseInt(data.department))) {
                showToast("Please select a valid department.", "error");
                return;
            }
            data.department_id = parseInt(data.department);

            try {
                const response = await fetch(`${API_BASE}/api/students`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });
                if (response.ok) {
                    showToast("Profile added successfully!");
                    e.target.reset();
                } else {
                    const errorData = await response.json();
                    showToast(errorData.error || "Error adding profile.", "error");
                }
            } catch (error) {
                console.error("Error adding profile:", error);
                showToast("Error adding profile.", "error");
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            loadDepartments();
        });
    </script>
</body>

</html>
